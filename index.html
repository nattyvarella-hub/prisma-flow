<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Acesso restrito</title>
</head>
<body style="text-align:center; font-family:sans-serif; margin-top:100px;">

<h2>Acesso restrito</h2>
<p>Digite a senha para acessar a ferramenta:</p>

<input type="password" id="senha" placeholder="Senha">
<button onclick="verificar()">Entrar</button>

<script>
function verificar() {
  var senha = document.getElementById("senha").value;

  if (senha === "natty123") {
    window.location.href = "./prisma_revisao_integrativa.html";
  } else {
    alert("Senha incorreta");
  }
}
</script>

</body>
</html>
